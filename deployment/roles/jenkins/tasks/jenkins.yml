---
# JENKINS INSTALLATION #
- name: install dependencies
  apt:
    name:
      - fontconfig
      - openjdk-17-jre
    state: present
    update_cache: yes
    cache_valid_time: 3600

- name: add jenkins repository
  copy:
    dest: /etc/apt/sources.list.d/jenkins.list
    content: "deb [trusted=yes] https://pkg.jenkins.io/debian-stable binary/"
    mode: '0644'

- name: force update apt cache after adding jenkins repo
  apt:
    update_cache: yes

- name: check jenkins package availability
  shell: apt-cache show jenkins | head -1
  register: jenkins_package_check
  changed_when: false
  failed_when: false

- name: install jenkins
  apt:
    name: jenkins
    state: present
  when: jenkins_package_check.rc == 0

- name: fail if jenkins package not available
  fail:
    msg: "Jenkins package is not available in the configured repository. Please check the repository configuration and network connectivity."
  when: jenkins_package_check.rc != 0

- name: create environment directory for Jenkins
  file:
    path: "{{ jenkins_home }}/environment"
    state: directory
    owner: jenkins
    group: jenkins
    mode: '0755'

- name: create environment backend directory for Jenkins
  file:
    path: "{{ jenkins_home }}/environment/backend"
    state: directory
    owner: jenkins
    group: jenkins
    mode: '0755'

- name: create environment frontend directory for Jenkins
  file:
    path: "{{ jenkins_home }}/environment/frontend"
    state: directory
    owner: jenkins
    group: jenkins
    mode: '0755'

- name: copy backend .env file in environment directory
  copy:
    src: docker-compose.env
    dest: "{{ jenkins_home }}/environment/backend/.env"
    owner: jenkins
    group: jenkins
    mode: '0644'

- name: copy frontend .env file in environment directory
  copy:
    src: frontend.env
    dest: "{{ jenkins_home }}/environment/frontend/.env"
    owner: jenkins
    group: jenkins
    mode: '0644'



# JENKINS PLUGINS INSTALLATION #
- name: create Jenkins plugins directory
  file:
    path: "{{ jenkins_home }}/plugins"
    state: directory
    owner: jenkins
    group: jenkins
    mode: '0755'

- name: check if plugins are already installed
  stat:
    path: "{{ jenkins_home }}/plugins/job-dsl.jpi"
  register: plugins_installed

- name: download jenkins-plugin-manager
  get_url:
    url: "https://github.com/jenkinsci/plugin-installation-manager-tool/releases/download/2.12.13/jenkins-plugin-manager-2.12.13.jar"
    dest: /tmp/jenkins-plugin-manager.jar
    mode: '0644'
  when: not plugins_installed.stat.exists

- name: copy plugins list from file
  copy:
    src: plugins.txt
    dest: /tmp/plugins.txt
    mode: '0644'
  when: not plugins_installed.stat.exists

- name: install plugins before first Jenkins start
  shell: |
    java -jar /tmp/jenkins-plugin-manager.jar \
      --war /usr/share/java/jenkins.war \
      --plugin-download-directory {{ jenkins_home }}/plugins \
      --plugin-file /tmp/plugins.txt \
      --verbose
    chown -R jenkins:jenkins {{ jenkins_home }}/plugins
  args:
    creates: "{{ jenkins_home }}/plugins/job-dsl.jpi"
  changed_when: false
  when: not plugins_installed.stat.exists
  notify: restart jenkins



# JENKINS CASC SETUP #
- name: create CasC configuration directory
  file:
    path: "{{ casc_config_dir }}"
    state: directory
    owner: jenkins
    group: jenkins
    mode: '0755'

- name: copy Job DSL script
  template:
    src: job_dsl.groovy.j2
    dest: "{{ jenkins_home }}/job_dsl.groovy"
    owner: jenkins
    group: jenkins
    mode: '0644'
  register: job_dsl_copy
  notify: restart jenkins

- name: copy Tili Job DSL script
  template:
    src: tili_jobs.groovy.j2
    dest: "{{ jenkins_home }}/tili_jobs.groovy"
    owner: jenkins
    group: jenkins
    mode: '0644'
  register: tili_job_dsl_copy
  notify: restart jenkins

- name: create .ssh directory for Jenkins user
  file:
    path: "{{ jenkins_home }}/.ssh"
    state: directory
    owner: jenkins
    group: jenkins
    mode: '0700'

- name: check if GitHub is in known_hosts
  command: ssh-keygen -F github.com -f {{ jenkins_home }}/.ssh/known_hosts
  register: github_known_hosts_check
  changed_when: false
  failed_when: false
  become_user: jenkins

- name: add GitHub to known_hosts for Jenkins user
  shell: ssh-keyscan -H github.com >> {{ jenkins_home }}/.ssh/known_hosts
  when: github_known_hosts_check.rc != 0
  become_user: jenkins

- name: check if Jenkins SSH key already exists
  stat:
    path: "{{ jenkins_home }}/.ssh/id_rsa"
  register: jenkins_key_stat

- name: read source SSH key
  slurp:
    src: "{{ ansible_ssh_private_key_file }}"
  register: source_key_content
  delegate_to: localhost
  become: false

- name: ensure source_key_content is defined
  fail:
    msg: "Failed to read SSH key from {{ ansible_ssh_private_key_file }}"
  when: source_key_content.content is undefined

- name: copy SSH private key for Jenkins user
  copy:
    content: "{{ source_key_content.content | b64decode }}"
    dest: "{{ jenkins_home }}/.ssh/id_rsa"
    owner: jenkins
    group: jenkins
    mode: '0600'

- name: template CasC configuration
  template:
    src: config.yml.j2
    dest: "{{ casc_config_dir }}/config.yml"
    owner: jenkins
    group: jenkins
    mode: '0644'
  notify: restart jenkins

- name: create systemd override directory for Jenkins
  file:
    path: /etc/systemd/system/jenkins.service.d
    state: directory
    mode: '0755'

- name: configure Jenkins with JCasC via systemd override
  copy:
    content: |
      [Service]
      Environment="JAVA_OPTS=-Djava.awt.headless=true -Djenkins.install.runSetupWizard=false -Dcasc.jenkins.config={{ jenkins_home }}/casc_configs/config.yml"
    dest: /etc/systemd/system/jenkins.service.d/override.conf
    mode: '0644'
  notify:
    - reload systemd daemon
    - restart jenkins



# JENKINS / DOCKER INTEGRATION #
- name: add jenkins user to docker group
  user:
    name: jenkins
    groups: docker
    append: yes
  notify: restart jenkins

- name: reset systemd failure counter for Jenkins
  command: systemctl reset-failed jenkins.service
  changed_when: false
  failed_when: false

- name: remove Jenkins boot failure record if present
  file:
    path: "{{ jenkins_home }}/failed-boot-attempts.xml"
    state: absent

- name: start and enable Jenkins service
  systemd:
    name: jenkins
    state: started
    enabled: yes

- name: wait for Jenkins to start
  wait_for:
    port: 8080
    delay: 10
    timeout: 300

- name: wait for Jenkins to be fully ready
  uri:
    url: "http://localhost:8080/login"
    status_code: 200
    timeout: 5
  register: jenkins_ready
  until: jenkins_ready.status == 200
  retries: 30
  delay: 10
...