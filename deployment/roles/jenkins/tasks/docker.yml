---
- name: create APT keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: determine Docker OS distribution
  set_fact:
    docker_os: "{{ 'debian' if ansible_distribution == 'Debian' else 'ubuntu' }}"

- name: download Docker GPG key
  get_url:
    url: "https://download.docker.com/linux/{{ docker_os }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: get OS version codename
  shell: . /etc/os-release && echo "$VERSION_CODENAME"
  register: os_codename
  changed_when: false
  check_mode: no

- name: add Docker repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ docker_os }} {{ os_codename.stdout }} stable"
    state: present
    filename: docker

- name: install Docker packages
  apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: yes
    cache_valid_time: 3600

- name: start and enable Docker service
  systemd:
    name: docker
    state: started
    enabled: yes

- name: configure Docker daemon for insecure registry
  template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    mode: '0644'
  notify: restart docker
  when: registry_ip is defined

- name: create images directory
  file:
    path: /var/lib/jenkins/images
    state: directory
    mode: '0755'

- name: create images language directories
  file:
    path: /var/lib/jenkins/images/{{ item }}
    state: directory
    mode: '0755'
  loop:
    - flutter
    - javascript
    - go

- name: copy all base images
  copy:
    src: "../../../../images/{{ item }}/Dockerfile"
    dest: /var/lib/jenkins/images/{{ item }}/Dockerfile
    mode: '0644'
  loop:
    - flutter
    - javascript
    - go
...